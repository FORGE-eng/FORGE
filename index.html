/* ---------- STORAGE (window.storage in-app · localStorage when downloaded · memory fallback) ---------- */
const MEM = {};
const hasWS = typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
async function storeGet(key){
  if(hasWS){ try{ const r = await window.storage.get(key); return r ? r.value : null; }catch(e){ return null; } }
  try{ return localStorage.getItem(key); }catch(e){ return (key in MEM) ? MEM[key] : null; }
}
async function storeSet(key,val){
  if(hasWS){ try{ await window.storage.set(key,val,false); return; }catch(e){} }
  try{ localStorage.setItem(key,val); }catch(e){ MEM[key]=val; }
}

/* ---------- JOURNAL ---------- */
const journal = document.getElementById('journal');
const jtext = document.getElementById('jtext');
const jsave = document.getElementById('jsave');
const jlist = document.getElementById('jlist');
const jcount = document.getElementById('jcount');
const JKEY = 'forge_journal_v1';
let entries = [];

function fmtDate(ts){
  const dt = new Date(ts);
  return dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}) + ' · ' +
         dt.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderJournal(){
  jcount.textContent = entries.length ? `${entries.length} entr${entries.length===1?'y':'ies'} · saved on this device` : '';
  if(!entries.length){ jlist.innerHTML = `<div class="jempty">No entries yet. Write your first one above.</div>`; return; }
  jlist.innerHTML = '';
  entries.forEach(e=>{
    const el = document.createElement('div');
    el.className = 'jentry';
    el.innerHTML = `
      <button class="jdel" data-id="${e.id}" aria-label="Delete entry"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V4h6v3M7 7l1 13h8l1-13"/></svg></button>
      <div class="jdate">${fmtDate(e.id)}</div>
      <div class="jtxt">${esc(e.text)}</div>`;
    jlist.appendChild(el);
  });
}

async function initJournal(){
  const raw = await storeGet(JKEY);
  try{ entries = raw ? JSON.parse(raw) : []; }catch(e){ entries = []; }
  if(!Array.isArray(entries)) entries = [];
  renderJournal();
}

jsave.addEventListener('click', async ()=>{
  const t = jtext.value.trim();
  if(!t) return;
  entries.unshift({ id:Date.now(), text:t });
  jtext.value = '';
  renderJournal();
  await storeSet(JKEY, JSON.stringify(entries));
  jsave.classList.add('saved'); jsave.textContent = 'Saved ✓';
  setTimeout(()=>{ jsave.classList.remove('saved'); jsave.textContent = 'Save entry'; }, 1200);
});

jlist.addEventListener('click', async (e)=>{
  const del = e.target.closest('.jdel');
  if(!del) return;
  const id = +del.dataset.id;
  entries = entries.filter(x=>x.id!==id);
  renderJournal();
  await storeSet(JKEY, JSON.stringify(entries));
});

function openJournal(){ journal.classList.add('open'); journal.scrollTop = 0; history.pushState({journal:true},''); }
function closeJournal(){ journal.classList.remove('open'); }
document.getElementById('openJournal').addEventListener('click', openJournal);
document.getElementById('jback').addEventListener('click', ()=> history.back());

const COTD_KEY = 'forge_cotd_v1';

function getDayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function seededIndex(dateKey, len){
  // simple hash so same day always picks same concept
  let h = 0;
  for(let i=0; i<dateKey.length; i++) h = (Math.imul(31, h) + dateKey.charCodeAt(i)) | 0;
  return Math.abs(h) % len;
}

async function initCOTD(){
  const wrap = document.getElementById('cotd-wrap');
  const dayKey = getDayKey();
  const idx = seededIndex(dayKey, data.length);
  const d = data[idx];

  // load stored state
  let state = { completed: false, streak: 0, lastDone: null };
  try{
    const raw = await storeGet(COTD_KEY);
    if(raw) state = JSON.parse(raw);
  }catch(e){}

  // check if completed today
  const doneToday = state.lastDone === dayKey;
  // update streak: if yesterday was done, streak continues; else reset on new day
  if(!doneToday && state.lastDone){
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yk = `${yesterday.getFullYear()}-${yesterday.getMonth()}-${yesterday.getDate()}`;
    if(state.lastDone !== yk) state.streak = 0; // missed a day
  }

  const task = COTD_TASKS[d.id] || d.tool;
  const streakTxt = state.streak > 0 ? `<span class="cotd-streak">🔥 ${state.streak}-day streak</span>` : '';

  wrap.innerHTML = `
    <div class="cotd" id="cotd-card" style="--cotd-c:${d.c}">
      <div class="cotd-inner">
        <div class="cotd-label">Concept of the day</div>
        <div class="cotd-top">
          <span class="cotd-icon">${icon(d.id)}</span>
          <div>
            <div class="cotd-name">${d.name}</div>
          </div>
        </div>
        <div class="cotd-hook">${d.hook}</div>
        <div class="cotd-divider"></div>
        <div class="cotd-task-label">Today's task</div>
        <div class="cotd-task">${task}</div>
        <div class="cotd-footer">
          <button class="cotd-done${doneToday?' completed':''}" id="cotd-btn">
            ${doneToday ? '✓ Done today' : 'Mark done'}
          </button>
          <span class="cotd-meta">${streakTxt}</span>
        </div>
      </div>
    </div>`;

  // click card body → open detail
  document.getElementById('cotd-card').addEventListener('click', (e)=>{
    if(e.target.closest('#cotd-btn')) return;
    openDetail(d);
  });

  // mark done
  document.getElementById('cotd-btn').addEventListener('click', async (e)=>{
    e.stopPropagation();
    if(doneToday) return;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yk = `${yesterday.getFullYear()}-${yesterday.getMonth()}-${yesterday.getDate()}`;
    const newStreak = (state.lastDone === yk || state.streak === 0) ? (state.streak + 1) : 1;
    state = { completed: true, streak: newStreak, lastDone: dayKey };
    await storeSet(COTD_KEY, JSON.stringify(state));
    // re-render
    initCOTD();
  });
}

render();
initJournal();
initCOTD();

let deferredPrompt = null;

  e.preventDefault();

  setTimeout(() => {
    if (!deferredPrompt) return;
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    showInstallBanner();
  }, 8000);
});

function showInstallBanner() {
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML = `
    <div style="
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:#15171d; border:1px solid #ff6b3d44; border-radius:16px;
      padding:14px 20px; display:flex; align-items:center; gap:14px;
      font-family:'Space Grotesk',sans-serif; z-index:999; max-width:340px; width:calc(100% - 40px);

      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;color:#ece9e2;">Install FORGE</div>

      </div>
      <button id="install-yes" style="
        background:#ff6b3d; color:#1a0a00; border:none; border-radius:10px;
        padding:9px 16px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; cursor:pointer;

  document.getElementById('install-yes').onclick = async () => {

}
